<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conditions Database</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --surface-alt: #161922;
      --border: #2a2d3a;
      --text: #e4e6ed;
      --text-secondary: #8b8fa3;
      --accent: #6c8cff;
      --accent-dim: rgba(108, 140, 255, 0.12);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.12);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.12);
      --cyan: #22d3ee;
      --cyan-dim: rgba(34, 211, 238, 0.12);
      --radius: 8px;
      --nav-height: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Navigation ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--nav-height);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
    }

    .nav-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      margin-right: 24px;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-link:hover { color: var(--text); background: var(--surface-hover); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); font-weight: 500; }

    /* ── Layout ── */
    .container {
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 360px;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-secondary); }

    .filter-group {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }

    .count-badge {
      color: var(--text-secondary);
      font-size: 13px;
      margin-left: auto;
      white-space: nowrap;
    }

    .per-page-select {
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .per-page-select:focus { border-color: var(--accent); }

    /* ── Table ── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.15s;
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }

    thead th .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    thead th:hover .sort-arrow, thead th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-hover); }
    tbody tr.clickable { cursor: pointer; }

    tbody td {
      padding: 10px 16px;
      font-size: 14px;
    }

    .cell-link {
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .cell-link:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-unlocked { background: var(--amber-dim); color: var(--amber); }
    .badge-locked   { background: var(--red-dim); color: var(--red); }
    .badge-frozen   { background: var(--cyan-dim); color: var(--cyan); }

    .mono {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .page-buttons { display: flex; gap: 4px; }

    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Loading / Error / Empty ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { padding: 32px; text-align: center; color: var(--red); font-size: 14px; }
    .empty-msg { padding: 48px; text-align: center; color: var(--text-secondary); font-size: 14px; }

    /* ── Home page ── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .home-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .home-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .home-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .home-card p {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .home-card .card-count {
      display: inline-block;
      margin-top: 12px;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Detail page ── */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .meta-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .meta-card .value {
      font-size: 16px;
      font-weight: 500;
    }

    /* ── Comparison ── */
    .compare-form {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 200px;
    }

    .form-field label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .form-field input, .form-field select {
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .form-field input:focus, .form-field select:focus { border-color: var(--accent); }

    .compare-btn {
      padding: 8px 24px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .compare-btn:hover { opacity: 0.85; }
    .compare-btn:disabled { opacity: 0.4; cursor: default; }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .compare-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .diff-row { padding: 6px 12px; font-size: 13px; border-radius: 4px; margin-bottom: 2px; }
    .diff-only-left  { background: var(--red-dim); color: var(--red); }
    .diff-only-right { background: var(--green-dim); color: var(--green); }
    .diff-both       { color: var(--text-secondary); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .compare-grid { grid-template-columns: 1fr; }
      .home-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const API = '/api/cdb_rest';

    // ── Utilities ──

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function badgeClass(status) {
      const s = (status || '').toLowerCase();
      if (s === 'frozen') return 'badge badge-frozen';
      if (s === 'locked') return 'badge badge-locked';
      return 'badge badge-unlocked';
    }

    function SearchIcon() {
      return (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      );
    }

    // ── Simple hash router ──

    function useRoute() {
      const [hash, setHash] = useState(window.location.hash || '#/');
      useEffect(() => {
        const handler = () => setHash(window.location.hash || '#/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      return hash;
    }

    function navigate(path) { window.location.hash = path; }

    function Link({ to, className, children, ...props }) {
      return <a href={`#${to}`} className={className} onClick={e => { e.preventDefault(); navigate(to); }} {...props}>{children}</a>;
    }

    // ── Reusable hooks ──

    function useFetch(url) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      useEffect(() => {
        setLoading(true);
        setError(null);
        fetch(url)
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, [url]);
      return { data, loading, error };
    }

    function useSortFilter(data, defaultSort, searchFields) {
      const [search, setSearch] = useState('');
      const [sortField, setSortField] = useState(defaultSort);
      const [sortDir, setSortDir] = useState('asc');
      const [page, setPage] = useState(0);
      const [pageSize, setPageSize] = useState(25);

      const handleSort = useCallback(field => {
        if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortField(field); setSortDir('asc'); }
      }, [sortField]);

      useEffect(() => { setPage(0); }, [search, pageSize]);

      const filtered = useMemo(() => {
        if (!data) return [];
        let result = data;
        if (search) {
          const q = search.toLowerCase();
          result = result.filter(item =>
            searchFields.some(f => (item[f] || '').toString().toLowerCase().includes(q))
          );
        }
        result = [...result].sort((a, b) => {
          let av = a[sortField], bv = b[sortField];
          if (av == null) av = '';
          if (bv == null) bv = '';
          if (typeof av === 'string') av = av.toLowerCase();
          if (typeof bv === 'string') bv = bv.toLowerCase();
          if (typeof av === 'number' && typeof bv === 'number') return sortDir === 'asc' ? av - bv : bv - av;
          if (av < bv) return sortDir === 'asc' ? -1 : 1;
          if (av > bv) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
        return result;
      }, [data, search, sortField, sortDir, searchFields]);

      const totalPages = Math.ceil(filtered.length / pageSize);
      const pageData = filtered.slice(page * pageSize, (page + 1) * pageSize);

      return { search, setSearch, sortField, sortDir, handleSort, page, setPage, pageSize, setPageSize, filtered, pageData, totalPages };
    }

    // ── Reusable components ──

    function SortHeader({ columns, sortField, sortDir, onSort }) {
      return (
        <thead>
          <tr>
            {columns.map(col => (
              <th key={col.key} className={sortField === col.key ? 'sorted' : ''} onClick={() => onSort(col.key)}>
                {col.label}
                <span className="sort-arrow">{sortField === col.key ? (sortDir === 'asc' ? '▲' : '▼') : '▲'}</span>
              </th>
            ))}
          </tr>
        </thead>
      );
    }

    function Pagination({ page, totalPages, setPage, filtered, pageSize, setPageSize }) {
      if (totalPages <= 1 && !setPageSize) return null;
      return (
        <div className="pagination">
          <span>
            {filtered.length} items
            {totalPages > 1 && ` · Page ${page + 1} of ${totalPages}`}
            {setPageSize && (
              <select className="per-page-select" value={pageSize} onChange={e => setPageSize(Number(e.target.value))} style={{marginLeft: 12}}>
                {[25, 50, 100, 200].map(n => <option key={n} value={n}>{n} / page</option>)}
              </select>
            )}
          </span>
          {totalPages > 1 && (
            <div className="page-buttons">
              <button className="page-btn" disabled={page === 0} onClick={() => setPage(0)}>First</button>
              <button className="page-btn" disabled={page === 0} onClick={() => setPage(p => p - 1)}>Prev</button>
              <button className="page-btn" disabled={page >= totalPages - 1} onClick={() => setPage(p => p + 1)}>Next</button>
              <button className="page-btn" disabled={page >= totalPages - 1} onClick={() => setPage(totalPages - 1)}>Last</button>
            </div>
          )}
        </div>
      );
    }

    function LoadingState({ message }) {
      return <div className="loading"><div className="spinner" />{message || 'Loading...'}</div>;
    }

    function Toolbar({ search, setSearch, placeholder, count, children, pageSize, setPageSize }) {
      return (
        <div className="toolbar">
          <div className="search-box">
            <SearchIcon />
            <input type="text" placeholder={placeholder} value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          {children}
          <span className="count-badge">{count} item{count !== 1 ? 's' : ''}</span>
        </div>
      );
    }

    // ── Pages ──

    function HomePage() {
      const { data: gts } = useFetch(`${API}/globalTags`);
      const { data: pts } = useFetch(`${API}/pt`);
      const { data: pls } = useFetch(`${API}/pl`);

      const iovCount = useMemo(() => {
        if (!pls || !Array.isArray(pls)) return '...';
        return pls.reduce((sum, pl) => sum + (pl.payload_iov ? pl.payload_iov.length : 0), 0);
      }, [pls]);

      const cards = [
        { title: 'Global Tags', desc: 'Browse, search, and inspect all global tags with their statuses and payload list counts.', route: '/globaltags', count: gts ? gts.length : '...' },
        { title: 'Payload Types', desc: 'View all registered payload type definitions used across the conditions database.', route: '/payloadtypes', count: pts ? pts.length : '...' },
        { title: 'Payload Lists', desc: 'Explore payload lists and their associations with global tags and payload types.', route: '/payloadlists', count: pls ? pls.length : '...' },
        { title: 'Payload IOVs', desc: 'Browse all payload IOVs (intervals of validity) across the database.', route: '/iovs', count: iovCount },
        { title: 'GT Comparison', desc: 'Compare two global tags side by side to see differences in their payload lists.', route: '/compare', count: null },
      ];

      return (
        <div className="container">
          <div className="page-header">
            <h1>Conditions Database</h1>
            <p>Browse and manage conditions data</p>
          </div>
          <div className="home-grid">
            {cards.map(c => (
              <div key={c.route} className="home-card" onClick={() => navigate(c.route)}>
                <h3>{c.title}</h3>
                <p>{c.desc}</p>
                {c.count !== null && <span className="card-count">{c.count}</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function GlobalTagsPage() {
      const { data, loading, error } = useFetch(`${API}/globalTags`);
      const [statusFilter, setStatusFilter] = useState('all');

      const statuses = useMemo(() => {
        if (!data) return [];
        return Array.from(new Set(data.map(gt => gt.status))).sort();
      }, [data]);

      const statusFiltered = useMemo(() => {
        if (!data) return [];
        if (statusFilter === 'all') return data;
        return data.filter(gt => gt.status === statusFilter);
      }, [data, statusFilter]);

      const sf = useSortFilter(statusFiltered, 'name', ['name', 'author']);

      const columns = [
        { key: 'name', label: 'Name' },
        { key: 'status', label: 'Status' },
        { key: 'author', label: 'Author' },
        { key: 'payload_lists_count', label: 'Payload Lists' },
        { key: 'payload_iov_count', label: 'IOVs' },
        { key: 'created', label: 'Created' },
        { key: 'updated', label: 'Updated' },
      ];

      return (
        <div className="container">
          <div className="page-header">
            <h1>Global Tags</h1>
            <p>All registered global tags in the conditions database</p>
          </div>
          <Toolbar search={sf.search} setSearch={sf.setSearch} placeholder="Search by name or author..." count={sf.filtered.length}>
            <div className="filter-group">
              <button className={`filter-btn ${statusFilter === 'all' ? 'active' : ''}`} onClick={() => setStatusFilter('all')}>All</button>
              {statuses.map(s => (
                <button key={s} className={`filter-btn ${statusFilter === s ? 'active' : ''}`} onClick={() => setStatusFilter(s)}>{s}</button>
              ))}
            </div>
          </Toolbar>
          <div className="table-wrapper">
            {loading ? <LoadingState message="Loading global tags..." /> :
             error ? <div className="error-msg">Failed to load: {error}</div> :
             sf.filtered.length === 0 ? <div className="empty-msg">No global tags found</div> : (
              <>
                <div className="table-scroll">
                  <table>
                    <SortHeader columns={columns} sortField={sf.sortField} sortDir={sf.sortDir} onSort={sf.handleSort} />
                    <tbody>
                      {sf.pageData.map(gt => (
                        <tr key={gt.id} className="clickable" onClick={() => navigate(`/globaltags/${gt.name}`)}>
                          <td><span className="cell-link">{gt.name}</span></td>
                          <td><span className={badgeClass(gt.status)}>{gt.status}</span></td>
                          <td>{gt.author || '—'}</td>
                          <td className="mono">{gt.payload_lists_count}</td>
                          <td className="mono">{gt.payload_iov_count}</td>
                          <td className="mono">{formatDate(gt.created)}</td>

    function ComparePage() {
      const [gt1, setGt1] = useState('');
      const [gt2, setGt2] = useState('');
      const [mode, setMode] = useState('diff');
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      async function doCompare() {
        if (!gt1.trim() || !gt2.trim()) return;
        setLoading(true);
        setError(null);
        try {
          const [r1, r2] = await Promise.all([
            fetch(`${API}/gtPayloadLists/${gt1.trim()}`).then(r => { if (!r.ok) throw new Error(`GT "${gt1}" not found`); return r.json(); }),
            fetch(`${API}/gtPayloadLists/${gt2.trim()}`).then(r => { if (!r.ok) throw new Error(`GT "${gt2}" not found`); return r.json(); }),
          ]);

          const map1 = {};
          const map2 = {};
          if (Array.isArray(r1)) r1.forEach(item => { map1[item.payload_type || item.type] = item.name || item.payload_list; });
          else Object.entries(r1).forEach(([k, v]) => { map1[k] = v; });
          if (Array.isArray(r2)) r2.forEach(item => { map2[item.payload_type || item.type] = item.name || item.payload_list; });
          else Object.entries(r2).forEach(([k, v]) => { map2[k] = v; });

          const allTypes = Array.from(new Set([...Object.keys(map1), ...Object.keys(map2)])).sort();
          const comparison = allTypes.map(type => ({
            type,
            left: map1[type] || null,
            right: map2[type] || null,
            match: map1[type] === map2[type],
          }));
          setResult({ gt1: gt1.trim(), gt2: gt2.trim(), comparison });
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      }

      const shown = result ? (mode === 'diff' ? result.comparison.filter(c => !c.match) : result.comparison) : [];

      return (
        <div className="container">
          <div className="page-header">
            <h1>Global Tag Comparison</h1>
            <p>Compare payload lists between two global tags</p>
          </div>
          <div className="compare-form">
            <div className="form-field">
              <label>Global Tag 1</label>
              <input value={gt1} onChange={e => setGt1(e.target.value)} placeholder="Enter GT name..." onKeyDown={e => e.key === 'Enter' && doCompare()} />
            </div>
            <div className="form-field">
              <label>Global Tag 2</label>
              <input value={gt2} onChange={e => setGt2(e.target.value)} placeholder="Enter GT name..." onKeyDown={e => e.key === 'Enter' && doCompare()} />
            </div>
            <div className="form-field" style={{minWidth: 140, flex: 'none'}}>
              <label>Mode</label>
              <select value={mode} onChange={e => setMode(e.target.value)}>
                <option value="diff">Differences only</option>
                <option value="full">Full comparison</option>
              </select>
            </div>
            <button className="compare-btn" disabled={!gt1.trim() || !gt2.trim() || loading} onClick={doCompare}>
              {loading ? 'Comparing...' : 'Compare'}
            </button>
          </div>
          {error && <div className="error-msg" style={{marginBottom: 16}}>{error}</div>}
          {result && (
            <div className="table-wrapper">
              {shown.length === 0 ? (
                <div className="empty-msg">
                  {mode === 'diff' ? 'No differences found — the global tags have identical payload lists.' : 'No payload lists to show.'}
                </div>
              ) : (
                <div className="table-scroll">
                  <table>
                    <thead>
                      <tr>
                        <th>Payload Type</th>
                        <th>{result.gt1}</th>
                        <th>{result.gt2}</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {shown.map(row => (
                        <tr key={row.type}>
                          <td style={{fontWeight: 500}}>{row.type}</td>
                          <td className="mono">{row.left || '—'}</td>
                          <td className="mono">{row.right || '—'}</td>
                          <td>
                            {row.match ? (
                              <span className="badge badge-frozen">Match</span>
                            ) : row.left && row.right ? (
                              <span className="badge badge-unlocked">Different</span>
                            ) : row.left ? (
                              <span className="badge badge-locked">Only in {result.gt1}</span>
                            ) : (
                              <span className="badge badge-unlocked" style={{background: 'var(--green-dim)', color: 'var(--green)'}}>Only in {result.gt2}</span>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {shown.length > 0 && (
                <div className="pagination">
                  <span>{shown.length} payload type{shown.length !== 1 ? 's' : ''}{mode === 'diff' ? ' with differences' : ' total'}</span>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── App ──

    function App() {
      const route = useRoute();
      const path = route.replace(/^#/, '') || '/';

      const navLinks = [
        { to: '/globaltags', label: 'Global Tags' },
        { to: '/payloadtypes', label: 'Payload Types' },
        { to: '/payloadlists', label: 'Payload Lists' },
        { to: '/iovs', label: 'IOVs' },
        { to: '/compare', label: 'Compare' },
      ];

      let page;
      if (path === '/') page = <HomePage />;
      else if (path === '/globaltags') page = <GlobalTagsPage />;
      else if (path.startsWith('/globaltags/')) page = <GlobalTagDetailPage name={decodeURIComponent(path.split('/globaltags/')[1])} />;
      else if (path === '/payloadtypes') page = <PayloadTypesPage />;
      else if (path.startsWith('/payloadtypes/')) page = <PayloadTypeDetailPage name={decodeURIComponent(path.split('/payloadtypes/')[1])} />;
      else if (path === '/payloadlists') page = <PayloadListsPage />;
      else if (path.startsWith('/payloadlists/')) page = <PayloadListDetailPage name={decodeURIComponent(path.split('/payloadlists/')[1])} />;
      else if (path === '/iovs') page = <PayloadIOVsPage />;
      else if (path === '/compare') page = <ComparePage />;
      else page = <div className="container"><div className="empty-msg">Page not found</div></div>;

      return (
        <>
          <nav>
            <Link to="/" className="nav-brand">CDB</Link>
            <div className="nav-links">
              {navLinks.map(l => (
                <Link key={l.to} to={l.to} className={`nav-link ${path.startsWith(l.to) ? 'active' : ''}`}>{l.label}</Link>
              ))}
            </div>
          </nav>
          {page}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
